baseURL = "https://rgn-website.vercel.app/"
languageCode = "id-id"
title = "RGN - Unlimited Connection"
# Theme tidak diperlukan — layout sudah ada di root /layouts
publishDir = "public"

[params]
  description = "RGN - Layanan internet fiber optik dengan koneksi unlimited, cepat, dan stabil."
  author = "RGN Team"
  tagline = "Unlimited Connection, Unlimited Possibilities"

[permalinks]
  layanan = "/layanan/"
  paket = "/paket/"
  tentang = "/tentang/"
  blog = "/blog/:slug/"

[minify]
  minifyOutput = true
  disableCSS = false
  disableHTML = false
  disableJS = false
  disableJSON = false
  disableSVG = false
  disableXML = false
  tdewolff = true

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    style = "dracula"
    guessSyntax = true