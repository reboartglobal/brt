{{ define "main" }}
<div class="page-header">
    <h1>Blog RGN</h1>
    <p>Artikel terbaru seputar internet, teknologi, dan tips dari RGN.</p>
</div>

<div class="blog-grid">
    {{ range .Pages }}
    <article class="blog-card">
        <h3><a href="{{ .Permalink }}">{{ .Title }}</a></h3>
        <div class="post-meta">
            <span><i class="far fa-user" aria-hidden="true"></i> {{ .Params.author }}</span>
            <span><i class="far fa-calendar-alt" aria-hidden="true"></i> {{ .Date.Format "2 Jan 2006" }}</span>
        </div>
        <p>{{ .Description }}</p>
        <a href="{{ .Permalink }}" class="btn-outline">Baca Selengkapnya</a>
    </article>
    {{ end }}
</div>
{{ end }}
