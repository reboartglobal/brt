name: Deploy to Wasmer

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: '0.125.0'
          extended: true

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'

      - name: Install Wasmer
        run: |
          curl https://get.wasmer.io -sSfL | sh
          export WASMER_DIR="$HOME/.wasmer"
          export PATH="$WASMER_DIR/bin:$PATH"
          wasmer --version

      - name: Build Hugo site
        run: hugo --gc --minify

      - name: Build Go to WebAssembly
        run: |
          GOOS=wasip1 GOARCH=wasm CGO_ENABLED=0 go build -o target/wasm32-wasi/release/rgn-server.wasm main_wasm.go
          mkdir -p target/static
          cp -r public/* target/static/

      - name: Create Wasmer package
        run: |
          cp wasmer.toml target/
          cd target
          tar -czf rgn-website.wasmer.tar.gz .

      - name: Deploy to Wasmer
        env:
          WASMER_TOKEN: ${{ secrets.WASMER_TOKEN }}
        run: |
          export PATH="$HOME/.wasmer/bin:$PATH"
          wasmer deploy --token $WASMER_TOKEN --package target/rgn-website.wasmer.tar.gz